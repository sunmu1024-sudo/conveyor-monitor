<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>传送带故障检测系统 | 波形图分析</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">🏭</span>
                <span class="logo-text">传送带故障检测系统</span>
                <span class="logo-sub">智能物联网监测平台</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">📈 波形图</a>
                <a href="data.html" class="nav-link">📋 数据报表</a>
                <a href="alarm.html" class="nav-link">🔔 报警记录</a>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-group">
                <div class="status-item">
                    <span class="status-label">📡 设备状态：</span>
                    <span id="deviceStatus" class="status-value online">在线</span>
                </div>
                <div class="status-item">
                    <span class="status-label">🕐 最后更新：</span>
                    <span id="lastUpdate" class="status-value">--:--:--</span>
                </div>
                <div class="status-item">
                    <span class="status-label">📊 当前参数：</span>
                    <span id="currentParamDisplay" class="status-value">X轴瞬时</span>
                </div>
            </div>
            <div class="btn-group">
                <button id="refreshBtn" class="btn btn-primary">🔄 刷新数据</button>
            </div>
        </div>

        <!-- 实时数据卡片（8个） -->
        <div class="sensor-grid">
            <div class="sensor-card">
                <h4>🌡️ 温度</h4>
                <div class="sensor-value"><span id="tempValue">--</span><span class="sensor-unit">°C</span></div>
                <div class="sensor-status" id="tempStatus">--</div>
            </div>
            <div class="sensor-card">
                <h4>📊 X轴瞬时</h4>
                <div class="sensor-value"><span id="xValue">--</span><span class="sensor-unit">g</span></div>
                <div class="sensor-status" id="xStatus">--</div>
            </div>
            <div class="sensor-card">
                <h4>📊 Y轴瞬时</h4>
                <div class="sensor-value"><span id="yValue">--</span><span class="sensor-unit">g</span></div>
                <div class="sensor-status" id="yStatus">--</div>
            </div>
            <div class="sensor-card">
                <h4>📊 Z轴瞬时</h4>
                <div class="sensor-value"><span id="zValue">--</span><span class="sensor-unit">g</span></div>
                <div class="sensor-status" id="zStatus">--</div>
            </div>
            <div class="sensor-card">
                <h4>🔧 皮带张力</h4>
                <div class="sensor-value"><span id="pressureValue">--</span><span class="sensor-unit">kPa</span></div>
                <div class="sensor-status" id="pressureStatus">--</div>
            </div>
            <div class="sensor-card">
                <h4>📈 X轴RMS</h4>
                <div class="sensor-value"><span id="rmsXValue">--</span><span class="sensor-unit">g</span></div>
                <div class="sensor-status" id="rmsXStatus">--</div>
            </div>
            <div class="sensor-card">
                <h4>📈 Y轴RMS</h4>
                <div class="sensor-value"><span id="rmsYValue">--</span><span class="sensor-unit">g</span></div>
                <div class="sensor-status" id="rmsYStatus">--</div>
            </div>
            <div class="sensor-card">
                <h4>📈 Z轴RMS</h4>
                <div class="sensor-value"><span id="rmsZValue">--</span><span class="sensor-unit">g</span></div>
                <div class="sensor-status" id="rmsZStatus">--</div>
            </div>
        </div>

        <!-- 图表控制栏 -->
        <div class="card" style="margin-bottom: 24px;">
            <div class="param-selector">
                <button class="param-btn active" data-param="x_axis">📊 X轴瞬时</button>
                <button class="param-btn" data-param="y_axis">📊 Y轴瞬时</button>
                <button class="param-btn" data-param="z_axis">📊 Z轴瞬时</button>
                <button class="param-btn" data-param="rms_x">📈 X轴RMS</button>
                <button class="param-btn" data-param="rms_y">📈 Y轴RMS</button>
                <button class="param-btn" data-param="rms_z">📈 Z轴RMS</button>
                <button class="param-btn" data-param="temperature">🌡️ 温度</button>
                <button class="param-btn" data-param="ch1_pressure">🔧 皮带张力</button>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="card">
            <div class="card-header">
                <h3 id="chartTitle">X轴瞬时振动 - 时域波形图</h3>
            </div>
            <div id="mainChart" style="width: 100%; height: 450px;"></div>
        </div>

        <div class="footer">
            <p>© 2025 传送带故障检测系统 | 数据实时同步自华为云IoTDA</p>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        // ========== 全局变量 ==========
        let currentChart = null;
        let currentParam = 'x_axis';
        
        const paramNames = {
            x_axis: 'X轴瞬时振动',
            y_axis: 'Y轴瞬时振动',
            z_axis: 'Z轴瞬时振动',
            rms_x: 'X轴RMS',
            rms_y: 'Y轴RMS',
            rms_z: 'Z轴RMS',
            temperature: '温度',
            ch1_pressure: '皮带张力'
        };
        
        const paramUnits = {
            x_axis: 'g',
            y_axis: 'g',
            z_axis: 'g',
            rms_x: 'g',
            rms_y: 'g',
            rms_z: 'g',
            temperature: '°C',
            ch1_pressure: 'kPa'
        };
        
        // ========== 刷新页面UI ==========
        function refreshPageUI() {
            updateSensorCards();
            updateChart();
            document.getElementById('deviceStatus').textContent = '在线';
            document.getElementById('deviceStatus').className = 'status-value online';
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
        }
        
        // ========== 初始化图表 ==========
        function initChart() {
            const dom = document.getElementById('mainChart');
            if (currentChart) {
                currentChart.dispose();
            }
            currentChart = echarts.init(dom);
            updateChart();
        }
        
        // ========== 更新传感器卡片 ==========
        function updateSensorCards() {
            const data = window.common.currentDeviceData;
            
            function setCard(id, value, unit) {
                const valEl = document.getElementById(id + 'Value');
                const statusEl = document.getElementById(id + 'Status');
                
                if (valEl) {
                    if (value !== null && value !== undefined) {
                        valEl.textContent = unit === 'kPa' ? value.toFixed(3) : value.toFixed(4);
                    } else {
                        valEl.textContent = '--';
                    }
                }
                
                if (statusEl) {
                    // 边缘AI判断的报警状态
                    const diagnosis = window.common.currentDiagnosis || {};
                    const isAlarm = diagnosis.alarm || false;
                    const faultType = diagnosis.fault_type || '正常';
                    
                    if (isAlarm && faultType !== '正常') {
                        statusEl.textContent = '⚠️ 报警';
                        statusEl.className = 'sensor-status status-alarm';
                    } else {
                        statusEl.textContent = '✅ 正常';
                        statusEl.className = 'sensor-status status-ok';
                    }
                }
            }
            
            setCard('temp', data.temperature, '°C');
            setCard('x', data.x_axis, 'g');
            setCard('y', data.y_axis, 'g');
            setCard('z', data.z_axis, 'g');
            setCard('pressure', data.ch1_pressure, 'kPa');
            setCard('rmsX', data.rms_x, 'g');
            setCard('rmsY', data.rms_y, 'g');
            setCard('rmsZ', data.rms_z, 'g');
        }
        
        // ========== 更新图表 ==========
        function updateChart() {
            if (!currentChart) return;
            
            const history = window.common.allHistoryData || [];
            
            document.getElementById('chartTitle').textContent = `${paramNames[currentParam]} - 时域波形图`;
            document.getElementById('currentParamDisplay').textContent = paramNames[currentParam];
            
            if (history.length === 0) {
                currentChart.setOption({
                    title: {
                        show: true,
                        text: '暂无数据，等待设备上报...',
                        left: 'center',
                        top: 'center'
                    }
                });
                return;
            }
            
            const recentData = history.slice(0, 100).reverse();
            const timestamps = recentData.map(d => d.displayTime || new Date(d.timestamp).toLocaleTimeString());
            const values = recentData.map(d => d[currentParam] ?? 0);
            
            const validValues = values.filter(v => !isNaN(v) && isFinite(v));
            let yMin = Math.min(...validValues, 0);
            let yMax = Math.max(...validValues, 0.1);
            
            const padding = (yMax - yMin) * 0.1;
            yMin = Math.max(yMin - padding, currentParam === 'temperature' ? 0 : -Infinity);
            yMax = yMax + padding;
            
            currentChart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { left: '8%', right: '5%', top: '15%', bottom: '15%', containLabel: false },
                xAxis: {
                    name: '时间',
                    type: 'category',
                    data: timestamps,
                    axisLabel: { rotate: 30, fontSize: 11, interval: Math.floor(timestamps.length / 8) || 0, margin: 10 },
                    axisLine: { lineStyle: { color: '#999' } }
                },
                yAxis: {
                    name: `${paramNames[currentParam]} (${paramUnits[currentParam]})`,
                    type: 'value',
                    min: yMin,
                    max: yMax,
                    nameLocation: 'middle',
                    nameGap: 50,
                    axisLabel: { fontSize: 11 },
                    splitLine: { lineStyle: { type: 'dashed', color: '#e0e0e0' } }
                },
                series: [{
                    type: 'line',
                    data: values,
                    smooth: true,
                    symbol: 'circle',
                    symbolSize: 6,
                    lineStyle: { width: 3, color: '#ff6b6b' },
                    areaStyle: { opacity: 0.1, color: '#ff6b6b' }
                }],
                dataZoom: [
                    { type: 'slider', start: 0, end: 100, bottom: 10 },
                    { type: 'inside', start: 0, end: 100 }
                ]
            }, true);
        }
        
        // ========== 页面初始化 ==========
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('波形图页面启动...');
            
            initChart();
            
            if (window.common && window.common.onDataUpdate) {
                window.common.onDataUpdate(() => refreshPageUI());
            }
            
            await window.common.updateData();
            refreshPageUI();
            
            window.common.startAutoRefresh(5000);
            
            document.getElementById('refreshBtn').addEventListener('click', async () => {
                await window.common.updateData();
                refreshPageUI();
            });
            
            document.querySelectorAll('.param-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.param-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentParam = btn.getAttribute('data-param');
                    updateChart();
                });
            });
            
            window.addEventListener('resize', () => currentChart?.resize());
        });
    </script>
</body>
</html>
